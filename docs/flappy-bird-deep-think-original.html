<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Bird 3D</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #e0f6ff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }
        #score {
            font-size: 85px; font-weight: 900; color: white; margin-top: 10vh;
            -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0 #000; line-height: 1;
        }
        #panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 35px 50px; border-radius: 20px;
            text-align: center; border: 4px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            pointer-events: auto; transition: transform 0.1s; cursor: pointer;
        }
        #panel:active { transform: translate(-50%, -45%); }
        h1 { margin: 0 0 10px 0; font-size: 42px; color: #333; font-weight: 900; text-transform: uppercase; }
        p { margin: 5px 0; font-size: 22px; color: #555; font-weight: bold; }
        .blink { animation: blinker 1s linear infinite; color: #e67e22; margin-top: 20px; font-size: 26px; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="ui">
        <div id="score">0</div>
        <div id="panel">
            <h1 id="title">Flappy 3D</h1>
            <p id="best">Best: 0</p>
            <p class="blink" id="prompt">TAP TO FLAP</p>
        </div>
    </div>

    <script>
        // --- 1. Scene & Camera Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02); // Atmospheric depth fading

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        function updateCamera() {
            const aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            // Pull camera back slightly in vertical/mobile mode to maintain a wide FOV of upcoming pipes
            camera.position.set(-6, 5, aspect < 1 ? 16 : 12);
            camera.lookAt(2, 4, 0); // ~30 degree angled side perspective looking forward
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', () => {
            updateCamera();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        updateCamera();

        // --- 2. Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(-5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 15; dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- 3. Scenery Elements ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 100), 
            new THREE.MeshLambertMaterial({ color: 0x55aa55 })
        );
        ground.rotation.x = -Math.PI / 2; ground.position.y = -3; ground.receiveShadow = true;
        scene.add(ground);

        const clouds = [], trees = [];
        const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const treeMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });

        for (let i = 0; i < 15; i++) {
            const cloud = new THREE.Mesh(new THREE.DodecahedronGeometry(1.5, 0), cloudMat);
            cloud.position.set(Math.random() * 100 - 40, Math.random() * 8 + 5, -Math.random() * 15 - 5);
            cloud.scale.set(1 + Math.random(), 0.8, 1 + Math.random());
            scene.add(cloud); clouds.push(cloud);
        }

        for (let i = 0; i < 20; i++) {
            const tree = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), treeMat);
            tree.position.set(Math.random() * 100 - 40, -2.25, -Math.random() * 10 - 2);
            tree.castShadow = true; tree.receiveShadow = true;
            scene.add(tree); trees.push(tree);
        }

        // --- 4. Yellow Bird Character ---
        const bird = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 16), new THREE.MeshLambertMaterial({ color: 0xffd700 }));
        body.castShadow = true; bird.add(body);

        const beak = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 16), new THREE.MeshLambertMaterial({ color: 0xff4500 }));
        beak.position.set(0.35, 0, 0); beak.rotation.z = -Math.PI / 2; beak.castShadow = true; bird.add(beak);

        const addEye = (z) => {
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            eye.position.set(0.2, 0.15, z);
            const pup = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            pup.position.set(0.25, 0.15, z > 0 ? z + 0.05 : z - 0.05);
            bird.add(eye, pup);
        };
        addEye(0.22); addEye(-0.22);

        const wingM = new THREE.MeshLambertMaterial({ color: 0xffa500 });
        const wingR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.4), wingM); 
        wingR.position.set(-0.1, 0, 0.35); wingR.castShadow = true; bird.add(wingR);
        const wingL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.4), wingM); 
        wingL.position.set(-0.1, 0, -0.35); wingL.castShadow = true; bird.add(wingL);

        scene.add(bird);

        // --- 5. Green Pipes ---
        const pipes = [];
        const pipeM = new THREE.MeshLambertMaterial({ color: 0x32CD32 });
        const pipeG = new THREE.CylinderGeometry(0.8, 0.8, 20, 16);
        const capG = new THREE.CylinderGeometry(0.95, 0.95, 0.5, 16);

        function spawnPipe(x) {
            const gapY = Math.random() * 5 + 1.5;
            const gapSize = 3.6;
            const pGroup = new THREE.Group();

            const bPipe = new THREE.Mesh(pipeG, pipeM); bPipe.position.y = -10 - gapSize/2;
            const bCap = new THREE.Mesh(capG, pipeM); bCap.position.y = -gapSize/2 - 0.25;
            const tPipe = new THREE.Mesh(pipeG, pipeM); tPipe.position.y = 10 + gapSize/2;
            const tCap = new THREE.Mesh(capG, pipeM); tCap.position.y = gapSize/2 + 0.25;

            [bPipe, bCap, tPipe, tCap].forEach(m => { m.castShadow = true; m.receiveShadow = true; pGroup.add(m); });
            pGroup.position.set(x, gapY, 0);
            scene.add(pGroup);
            pipes.push({ group: pGroup, gapY, gapSize, passed: false });
        }

        // --- 6. Game Logic ---
        let state = 'START'; // START, PLAY, OVER
        let score = 0;
        let hiScore = 0;
        let canRestart = true;
        let velocity = 0;
        
        const gravity = -35;
        const flapStrength = 11;
        const speed = 7;

        // Fetch local storage safely without throwing browser DOM exceptions
        try { hiScore = localStorage.getItem('flappy3d_hs') || 0; } catch (e) {}
        document.getElementById('best').innerText = 'Best: ' + hiScore;

        function reset() {
            score = 0; document.getElementById('score').innerText = score;
            bird.position.set(0, 4, 0); bird.rotation.z = 0; velocity = 0;
            pipes.forEach(p => scene.remove(p.group)); pipes.length = 0;
            for (let i = 0; i < 6; i++) spawnPipe(15 + i * 8); // Spawn incoming lineup 
        }

        function die() {
            if (state === 'OVER') return;
            state = 'OVER';
            canRestart = false; setTimeout(() => canRestart = true, 400); // Prevent accidental immediate resets
            
            if (score > hiScore) {
                hiScore = score;
                try { localStorage.setItem('flappy3d_hs', hiScore); } catch (e) {}
                document.getElementById('best').innerText = 'Best: ' + hiScore;
            }
            document.getElementById('title').innerText = 'Game Over';
            document.getElementById('prompt').innerText = 'TAP TO RESTART';
            document.getElementById('panel').style.display = 'block';
        }

        function flap(e) {
            if (e && e.type !== 'keydown') e.preventDefault();
            if (state === 'START' || (state === 'OVER' && canRestart && bird.position.y <= -2.5)) {
                reset(); state = 'PLAY';
                document.getElementById('panel').style.display = 'none';
                velocity = flapStrength;
            } else if (state === 'PLAY') {
                velocity = flapStrength;
            }
        }

        window.addEventListener('pointerdown', flap, { passive: false });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') flap(e); });

        // --- 7. Animation Loop ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            let dt = Math.min(clock.getDelta(), 0.05); // Safe clamp
            let t = clock.elapsedTime;

            if (state === 'START') {
                bird.position.y = 4 + Math.sin(t * 5) * 0.4; // Idle float
                wingR.rotation.x = wingL.rotation.x = Math.sin(t * 15) * 0.2;
            } else if (state === 'PLAY') {
                velocity += gravity * dt;
                bird.position.y += velocity * dt;
                
                // Bird pitch rotation mimicking physics trajectory
                bird.rotation.z += (Math.max(-Math.PI/2, Math.min(Math.PI/4, velocity * 0.1)) - bird.rotation.z) * 15 * dt;

                // Wing flapping correlated to upward momentum
                let flapA = velocity > 0 ? Math.sin(t * 40) * 0.5 : 0;
                wingR.rotation.x = flapA; wingL.rotation.x = -flapA;

                if (bird.position.y < -2.5 || bird.position.y > 11) die();

                pipes.forEach(p => {
                    p.group.position.x -= speed * dt;
                    if (!p.passed && p.group.position.x < 0) {
                        p.passed = true; score++; document.getElementById('score').innerText = score;
                    }
                    // Forgiving strict hitbox bounding calculations
                    if (p.group.position.x > -1.2 && p.group.position.x < 1.2) {
                        if (bird.position.y + 0.3 > p.gapY + p.gapSize/2 || bird.position.y - 0.3 < p.gapY - p.gapSize/2) die();
                    }
                });

                // Recycle passed pipes continuously 
                if (pipes[0] && pipes[0].group.position.x < -10) {
                    const p = pipes.shift(); scene.remove(p.group);
                    spawnPipe(pipes[pipes.length - 1].group.position.x + 8);
                }

                // Foreground parallax scroll
                trees.forEach(tr => { tr.position.x -= speed * dt; if (tr.position.x < -20) tr.position.x += 80; });
            } else if (state === 'OVER') {
                if (bird.position.y > -2.5) { // Crash spinning drop
                    velocity += gravity * 1.5 * dt; bird.position.y += velocity * dt; bird.rotation.z -= 6 * dt;
                } else bird.position.y = -2.5;
            }

            // Background Parallax scroll
            clouds.forEach(c => { c.position.x -= 2 * dt; if (c.position.x < -40) c.position.x += 80; });
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
