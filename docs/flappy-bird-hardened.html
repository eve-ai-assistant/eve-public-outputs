<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>3D Flappy Bird - Hardened</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #87CEEB; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; }
#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; z-index: 10; }
.glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 16px; padding: 10px 28px; color: #fff; font-family: system-ui, -apple-system, sans-serif; text-align: center; pointer-events: auto; }
#score { font-size: 52px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.25); }
#overPanel { display: none; margin-top: 30vh; padding: 24px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
#overPanel h2 { font-size: 26px; margin-bottom: 6px; }
#overPanel p { font-size: 15px; opacity: 0.85; line-height: 1.6; }
#startHint { margin-top: 50vh; font-size: 20px; font-weight: bold; animation: pulse 1.4s ease infinite; background: rgba(0,0,0,0.4); border: none; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
#sys-log { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(211, 47, 47, 0.95); color: #fff; font-family: monospace; font-size: 12px; padding: 10px; display: none; z-index: 1000; text-align: center; font-weight: bold; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="sys-log"></div>
<div id="ui">
    <div class="glass" style="margin-top:24px"><div id="score">0</div></div>
    <div class="glass" id="overPanel">
        <h2>Game Over</h2>
        <p id="final"></p>
        <p id="bestP"></p>
        <p style="margin-top:12px; opacity:0.6; font-size:13px; font-weight:bold;">Tap to restart</p>
    </div>
    <div class="glass" id="startHint">Loading Engine...</div>
</div>

<script>
"use strict";

/* ── Observability Boundary ── */
const sysLog = document.getElementById('sys-log');
window.addEventListener('error', (e) => {
    if (sysLog) {
        sysLog.style.display = 'block';
        sysLog.textContent = `[Engine Fault]: ${e.message}`;
    }
});

/* ── Immutable Domain Config ── */
const CONFIG = Object.freeze({
    GRAVITY: -24,
    FLAP_V: 8.5,
    SPEED: 6.5,
    GAP: 5.5,
    PIPE_SPACING: 8.0,
    MIN_GAP_Y: 2.5,
    MAX_GAP_Y: 8.5,
    FLOOR_Y: -1.0,
    CEIL_Y: 14.0,
    BIRD_R: 0.35,
    PIPE_R: 1.15,
    CAP_R: 1.35,
    CAP_H: 0.45,
    POOL_SIZE: 8,
    BIRD_X: 0
});

const STATE = Object.freeze({ TITLE: 0, PLAYING: 1, DEAD: 2 });

/* ── Safe Sandbox I/O ── */
const StorageSafe = {
    get: (key, fallback) => {
        try {
            const val = localStorage.getItem(key);
            if (val === null) return fallback;
            const num = parseInt(val, 10);
            return Number.isFinite(num) ? num : fallback;
        } catch (e) {
            console.warn("[System] Storage read blocked:", e);
            return fallback;
        }
    },
    set: (key, val) => {
        try { localStorage.setItem(key, val.toString()); } 
        catch (e) { console.warn("[System] Storage write blocked:", e); }
    }
};

/* ── Global Entities ── */
let currentState = STATE.TITLE;
let birdY = 4, vel = 0, score = 0, deathTime = 0;
let bestScore = StorageSafe.get('fb3d_v2', 0);

let scene, cam, renderer, clock;
let bird, pipeManager;
const wings = [], clouds = [];

/* ── Zero-Allocation Object Pool ── */
class PipeManager {
    constructor(sceneRef) {
        this.pool = [];
        this.active = [];
        
        // Single shared geometries & materials preventing GC spikes
        const pGeo = new THREE.CylinderGeometry(CONFIG.PIPE_R, CONFIG.PIPE_R, 1, 16);
        pGeo.translate(0, 0.5, 0); // Translate base to Y=0 for unidirectional scaling
        const cGeo = new THREE.CylinderGeometry(CONFIG.CAP_R, CONFIG.CAP_R, CONFIG.CAP_H, 16);
        
        const pMat = new THREE.MeshStandardMaterial({ color: 0x388E3C, roughness: 0.7 });
        const cMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.8 });
        
        for (let i = 0; i < CONFIG.POOL_SIZE; i++) {
            const group = new THREE.Group();
            const bm = new THREE.Mesh(pGeo, pMat); bm.castShadow = true; bm.receiveShadow = true;
            const bc = new THREE.Mesh(cGeo, cMat); bc.castShadow = true;
            const tm = new THREE.Mesh(pGeo, pMat); tm.castShadow = true; tm.receiveShadow = true;
            const tc = new THREE.Mesh(cGeo, cMat); tc.castShadow = true;
            
            group.add(bm, bc, tm, tc);
            group.visible = false;
            sceneRef.add(group);
            
            this.pool.push({ group, bm, bc, tm, tc, active: false, gapY: 0, scored: false });
        }
    }

    spawn(x) {
        const p = this.pool.find(item => !item.active);
        if (!p) return false;
        
        p.active = true;
        p.scored = false;
        p.group.visible = true;
        p.group.position.x = x;
        p.gapY = CONFIG.MIN_GAP_Y + Math.random() * (CONFIG.MAX_GAP_Y - CONFIG.MIN_GAP_Y);
        
        // Matrix transformations simulating new geometries bounds dynamically
        const bottomTop = p.gapY - (CONFIG.GAP / 2);
        const bH = Math.max(0.01, bottomTop - CONFIG.FLOOR_Y);
        p.bm.scale.y = bH;
        p.bm.position.y = CONFIG.FLOOR_Y;
        p.bc.position.y = bottomTop - (CONFIG.CAP_H / 2);
        
        const topBottom = p.gapY + (CONFIG.GAP / 2);
        const tH = Math.max(0.01, 20 - topBottom);
        p.tm.scale.y = tH;
        p.tm.position.y = topBottom;
        p.tc.position.y = topBottom + (CONFIG.CAP_H / 2);
        
        this.active.push(p);
        return true;
    }

    update(dt, birdX, scoreCallback) {
        for (let i = 0; i < this.active.length; i++) {
            const p = this.active[i];
            p.group.position.x -= CONFIG.SPEED * dt;
            
            // X-Axis Transitive evaluation 
            if (!p.scored && p.group.position.x < birdX) {
                p.scored = true;
                scoreCallback();
            }
        }
        
        // Evict cleanly off-screen geometries iteratively
        while (this.active.length > 0 && this.active[0].group.position.x < -15) {
            const p = this.active.shift();
            p.active = false;
            p.group.visible = false;
        }
    }

    get lastX() {
        return this.active.length === 0 ? 10 - CONFIG.PIPE_SPACING : this.active[this.active.length - 1].group.position.x;
    }

    reset() {
        while(this.active.length > 0) {
            const p = this.active.shift();
            p.active = false;
            p.group.visible = false;
        }
    }
}

/* ── Bootstrapper & Initialization ── */
window.addEventListener('load', () => {
    if (typeof THREE === 'undefined') {
        const ui = document.getElementById('ui');
        ui.innerHTML = `<div class="glass" style="margin-top:20vh;background:rgba(220,53,69,0.9)"><h2>Network Error</h2><p>Three.js Engine dependency blocked or failed.</p></div>`;
        return;
    }
    try {
        initGame();
    } catch (err) {
        console.error("Critical Engine Assembly Failure:", err);
        const ui = document.getElementById('ui');
        ui.innerHTML = `<div class="glass" style="margin-top:20vh;background:rgba(220,53,69,0.9)"><h2>Fatal Error</h2><p>${err.message}</p></div>`;
    }
});

function initGame() {
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.max(1, Math.min(window.devicePixelRatio || 1, 2)));
    
    const initW = Math.max(1, window.innerWidth);
    const initH = Math.max(1, window.innerHeight);
    renderer.setSize(initW, initH);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87CEEB, 20, 55);
    cam = new THREE.PerspectiveCamera(50, initW / initH, 0.1, 80);
    cam.position.set(6, 9, 18);
    cam.lookAt(0, 3.5, 0);
    
    buildEnvironment();
    buildBird();

    clock = new THREE.Clock();
    pipeManager = new PipeManager(scene);

    bindEvents();
    restart();
    animate();
}

/* ── Procedural Content Generation ── */
function buildEnvironment() {
    const bgC = document.createElement('canvas');
    bgC.width = 2; bgC.height = 512;
    const bgX = bgC.getContext('2d');
    if (bgX) {
        const grd = bgX.createLinearGradient(0, 0, 0, 512);
        grd.addColorStop(0, '#4A8FD9'); grd.addColorStop(0.6, '#87CEEB'); grd.addColorStop(1, '#E0F0FA');
        bgX.fillStyle = grd; bgX.fillRect(0, 0, 2, 512);
        scene.background = new THREE.CanvasTexture(bgC);
    } else {
        scene.background = new THREE.Color(0x87CEEB);
    }

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 15, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(512, 512); 
    Object.assign(sun.shadow.camera, { near: 1, far: 50, left: -20, right: 20, top: 20, bottom: -10 });
    scene.add(sun);

    const gnd = new THREE.Mesh(new THREE.PlaneGeometry(100, 30), new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 1.0 }));
    gnd.rotation.x = -Math.PI / 2; gnd.position.y = CONFIG.FLOOR_Y;
    gnd.receiveShadow = true; scene.add(gnd);
    
    const grassStrip = new THREE.Mesh(new THREE.PlaneGeometry(100, 1.5), new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 }));
    grassStrip.rotation.x = -Math.PI / 2; grassStrip.position.set(0, CONFIG.FLOOR_Y + 0.01, 9);
    grassStrip.receiveShadow = true; scene.add(grassStrip);

    const cMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
    const cloudGeo = new THREE.SphereGeometry(1, 8, 6);
    for (let i = 0; i < 6; i++) {
        const cg = new THREE.Group();
        for (let j = 0; j < 3; j++) {
            const r = Math.max(0.4, 0.7 + Math.random() * 0.8);
            const s = new THREE.Mesh(cloudGeo, cMat);
            s.scale.set(r, r * 0.8, r);
            s.position.set(j * 1.4 - 1.4, Math.random() * 0.25, Math.random() * 0.4);
            cg.add(s);
        }
        cg.position.set(-15 + i * 10, 11 + Math.random() * 3, -8 - Math.random() * 5);
        scene.add(cg);
        clouds.push({ mesh: cg, speed: 0.2 + Math.random() * 0.4 });
    }
}

function buildBird() {
    bird = new THREE.Group();
    const bBody = new THREE.Mesh(new THREE.SphereGeometry(CONFIG.BIRD_R, 16, 12), new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.4 }));
    bBody.castShadow = true; bird.add(bBody);

    const wMat = new THREE.MeshStandardMaterial({ color: 0xFF8C00, side: THREE.DoubleSide });
    const wGeo = new THREE.PlaneGeometry(0.55, 0.25);
    [-0.35, 0.35].forEach(z => {
        const w = new THREE.Mesh(wGeo, wMat); w.position.set(-0.1, 0.2, z);
        bird.add(w); wings.push(w);
    });

    const eyeM = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    eyeM.position.set(0.28, 0.15, 0.18); bird.add(eyeM);

    const beak = new THREE.Mesh(new THREE.ConeGeometry(0.11, 0.28, 8), new THREE.MeshStandardMaterial({ color: 0xFF5500 }));
    beak.rotation.z = -Math.PI / 2; beak.position.set(0.45, 0.02, 0); bird.add(beak);
    scene.add(bird);
}

/* ── Cartesian Mathematical Physics Matrix ── */
function checkHit() {
    if (birdY - CONFIG.BIRD_R <= CONFIG.FLOOR_Y || birdY + CONFIG.BIRD_R >= CONFIG.CEIL_Y) return true;
    
    for (let i = 0; i < pipeManager.active.length; i++) {
        const p = pipeManager.active[i];
        const dx = Math.abs(p.group.position.x - CONFIG.BIRD_X);
        
        if (dx < CONFIG.CAP_R + CONFIG.BIRD_R) {
            const topBoundary = p.gapY + (CONFIG.GAP / 2);
            const bottomBoundary = p.gapY - (CONFIG.GAP / 2);
            
            // Logically isolates structural geometric intersection over void assumptions
            if (birdY + CONFIG.BIRD_R > topBoundary || birdY - CONFIG.BIRD_R < bottomBoundary) {
                return true;
            }
        }
    }
    return false;
}

/* ── Logical State Transmissions ── */
function triggerDeath() {
    currentState = STATE.DEAD;
    deathTime = Date.now();
    bestScore = Math.max(score, bestScore);
    StorageSafe.set('fb3d_v2', bestScore);
    
    document.getElementById('final').textContent = 'Score: ' + score;
    document.getElementById('bestP').textContent = 'Best: ' + bestScore;
    document.getElementById('overPanel').style.display = 'block';
}

function restart() {
    birdY = 4; vel = 0; score = 0;
    document.getElementById('score').textContent = '0';
    document.getElementById('overPanel').style.display = 'none';
    const startHint = document.getElementById('startHint');
    startHint.style.display = 'block';
    startHint.textContent = 'Tap to Flap!';
    
    pipeManager.reset();
    let nextX = 15;
    for(let i = 0; i < 4; i++) {
        pipeManager.spawn(nextX);
        nextX += CONFIG.PIPE_SPACING;
    }
    
    bird.position.y = birdY;
    bird.rotation.z = 0;
    currentState = STATE.TITLE;
}

/* ── Engine Loop Sequence ── */
function animate() {
    requestAnimationFrame(animate);
    try {
        const dt = Math.max(0.001, Math.min(clock.getDelta(), 0.05)); // 50ms temporal bounds clamping
        
        if (currentState === STATE.TITLE) {
            bird.position.y = 4 + Math.sin(clock.elapsedTime * 4) * 0.4;
            bird.rotation.z = 0;
            clouds.forEach(c => updateCloud(c, dt));
        } 
        else if (currentState === STATE.PLAYING) {
            vel += CONFIG.GRAVITY * dt;
            birdY += vel * dt;
            bird.position.y = birdY;
            bird.rotation.z = Math.max(-Math.PI/4, Math.min(vel * 0.06, Math.PI/4));
            
            const flapRate = vel > 0 ? 0.4 : 0.1;
            wings.forEach(w => w.rotation.x = Math.sin(clock.elapsedTime * 25) * flapRate);
            
            pipeManager.update(dt, CONFIG.BIRD_X, () => {
                score++;
                document.getElementById('score').textContent = score;
            });
            
            let spawns = 0;
            while (pipeManager.lastX < 35 && spawns < 5) {
                if (!pipeManager.spawn(pipeManager.lastX + CONFIG.PIPE_SPACING)) break;
                spawns++;
            }
            
            clouds.forEach(c => updateCloud(c, dt));
            
            if (checkHit()) triggerDeath();
        } 
        else if (currentState === STATE.DEAD) {
            if (birdY > CONFIG.FLOOR_Y + CONFIG.BIRD_R) {
                vel += CONFIG.GRAVITY * dt * 1.5;
                birdY += vel * dt;
                bird.position.y = Math.max(CONFIG.FLOOR_Y + CONFIG.BIRD_R, birdY);
                bird.rotation.z = Math.max(-Math.PI/2, bird.rotation.z - 8 * dt);
                wings.forEach(w => w.rotation.x = 0);
            }
        }
        renderer.render(scene, cam);
    } catch (err) {
        console.error("Critical Main Thread Loop Exception:", err);
    }
}

function updateCloud(c, dt) {
    c.mesh.position.x -= (CONFIG.SPEED * 0.15 + c.speed) * dt;
    if (c.mesh.position.x < -20) {
        c.mesh.position.x = 25 + Math.random() * 5;
        c.mesh.position.y = 10 + Math.random() * 3;
    }
}

/* ── Resiliency Input Layer ── */
function onInput(e) {
    if (e.type === 'keydown' && (e.code !== 'Space' || e.repeat)) return;
    if (e.cancelable) e.preventDefault();
    
    if (currentState === STATE.TITLE) {
        currentState = STATE.PLAYING;
        document.getElementById('startHint').style.display = 'none';
        vel = CONFIG.FLAP_V;
    } else if (currentState === STATE.PLAYING) {
        vel = CONFIG.FLAP_V;
    } else if (currentState === STATE.DEAD) {
        if (Date.now() - deathTime > 500) restart();
    }
}

function bindEvents() {
    document.addEventListener('keydown', onInput);
    document.addEventListener('touchstart', onInput, { passive: false });
    document.addEventListener('mousedown', onInput);
    
    window.addEventListener('resize', () => {
        const cw = Math.max(1, window.innerWidth);
        const ch = Math.max(1, window.innerHeight);
        cam.aspect = cw / ch;
        cam.updateProjectionMatrix();
        renderer.setSize(cw, ch);
    });
}
</script>
</body>
</html>
