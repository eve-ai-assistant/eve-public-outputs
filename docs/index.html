<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Flappy Bird</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none; /* Prevents unwanted browser gestures */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #87CEEB;
        }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Glassmorphism UI Elements */
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 20px; color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; pointer-events: none; 
            display: flex; justify-content: center; align-items: center; flex-direction: column; 
        }
        
        #start-screen { 
            padding: 35px 25px; text-align: center; pointer-events: auto; 
            width: 320px; max-width: 90%; display: flex; flex-direction: column; gap: 8px;
        }
        #start-screen h1 { margin: 0 0 15px 0; font-size: 42px; text-transform: uppercase; letter-spacing: 2px;}
        #start-screen p { margin: 5px 0; font-size: 22px; font-weight: bold; }
        
        .btn { 
            margin-top: 15px; padding: 18px; font-size: 24px; font-weight: 900; cursor: pointer;
            background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.6); 
            border-radius: 15px; color: white; transition: transform 0.1s; outline: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        
        .instructions { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin: 15px 10px 0; opacity: 0.9;}
        
        #hud { 
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%); 
            padding: 10px 40px; font-size: 45px; font-weight: 900; 
            display: none; pointer-events: none; z-index: 5; border-radius: 20px;
        }

        /* Virtual Mobile Controls */
        #controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; z-index: 20; pointer-events: none; }
        #joystick-zone {
            position: absolute; bottom: 40px; left: 20px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
            pointer-events: auto; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.85); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none; transform: translate(0px, 0px);
        }
        #jump-btn {
            position: absolute; bottom: 40px; right: 20px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
            color: white; font-weight: 900; font-size: 24px; display: flex; justify-content: center; align-items: center;
            pointer-events: auto; text-shadow: 0 2px 4px rgba(0,0,0,0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            cursor: pointer;
        }
        #jump-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }

        /* Lock to Vertical Mode */
        #portrait-lock { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #fff; z-index: 9999; justify-content: center; align-items: center; text-align: center; font-size: 24px; font-weight: bold; }
        @media (orientation: landscape) and (max-height: 500px) { #portrait-lock { display: flex; } }
    </style>
</head>
<body>

<div id="portrait-lock">Please rotate device<br>to Portrait Mode</div>
<div id="game-container"></div>

<div id="ui-layer">
    <div id="start-screen" class="glass">
        <h1>3D Flappy</h1>
        <p>Score: <span id="final-score">0</span></p>
        <p>Best: <span id="high-score">0</span></p>
        <div class="instructions">
            <span>👈 Steer</span>
            <span>Jump 👉</span>
        </div>
        <button id="start-btn" class="btn">FLY</button>
    </div>
</div>
<div id="hud" class="glass">0</div>

<div id="controls">
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="jump-btn">JUMP</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // Native gesture override (prevents scrolling/bouncing securely)
    document.addEventListener('touchmove', e => { if (e.cancelable) e.preventDefault(); }, { passive: false });

    // --- 1. GAME STATE & SETTINGS ---
    let gameState = 'START'; 
    let score = 0, highScore = 0;
    try { highScore = localStorage.getItem('flappy3d_highscore') || 0; } catch (e) {}
    document.getElementById('high-score').innerText = highScore;

    let birdY = 7, birdX = 0, birdVelocityY = 0;
    const gravity = -50, jumpStrength = 16, gameSpeed = 22;
    const birdRadius = 0.4, pipeRadius = 1.75, gapH = 4.8, roofY = 16;
    let joyX = 0; // Axis: -1 to 1

    // --- 2. THREE.JS ENVIRONMENT SETUP ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();

    // Procedural Sky Gradient Background
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2; bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext('2d');
    const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#1a82f7'); grad.addColorStop(1, '#e0f6ff');
    bgCtx.fillStyle = grad; bgCtx.fillRect(0, 0, 2, 512);
    scene.background = new THREE.CanvasTexture(bgCanvas);
    scene.fog = new THREE.Fog('#e0f6ff', 20, 70);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 14);
    camera.lookAt(0, 5, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(10, 25, 10);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -25; dirLight.shadow.camera.right = 25;
    dirLight.shadow.camera.top = 25; dirLight.shadow.camera.bottom = -25;
    dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    // --- 3. SCROLLING GROUND ---
    const groundCanvas = document.createElement('canvas');
    groundCanvas.width = 512; groundCanvas.height = 512;
    const gCtx = groundCanvas.getContext('2d');
    gCtx.fillStyle = '#558B2F'; gCtx.fillRect(0, 0, 512, 512);
    gCtx.fillStyle = '#659D32';
    for(let i=0; i<512; i+=64) {
        for(let j=0; j<512; j+=64) { if(((i/64)+(j/64)) % 2 === 0) gCtx.fillRect(i, j, 64, 64); }
    }
    const groundTex = new THREE.CanvasTexture(groundCanvas);
    groundTex.wrapS = THREE.RepeatWrapping; groundTex.wrapT = THREE.RepeatWrapping;
    groundTex.repeat.set(15, 30);
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 200), new THREE.MeshLambertMaterial({ map: groundTex }));
    ground.rotation.x = -Math.PI / 2; ground.position.y = 0; ground.receiveShadow = true;
    scene.add(ground);

    // --- 4. BIRD ENTITY ---
    const bird = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(birdRadius, 32, 32), new THREE.MeshLambertMaterial({ color: 0xFFD700 }));
    body.castShadow = true; bird.add(body);
    
    const wingMat = new THREE.MeshLambertMaterial({ color: 0xFFA500, side: THREE.DoubleSide });
    const wingL = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.5), wingMat);
    wingL.position.set(-0.45, 0, 0); wingL.rotation.x = Math.PI / 2; bird.add(wingL);
    const wingR = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.5), wingMat);
    wingR.position.set(0.45, 0, 0); wingR.rotation.x = Math.PI / 2; bird.add(wingR);

    const beak = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.5, 16), new THREE.MeshLambertMaterial({ color: 0xFF4500 }));
    beak.position.set(0, 0, -0.45); beak.rotation.x = -Math.PI / 2; bird.add(beak);
    scene.add(bird);

    // --- 5. PIPES (INSTANCED MESH SYSTEM) ---
    const cols = [-3.5, 0, 3.5]; // 3 Interactive Lanes (touching precisely to form solid walls)
    const waveCount = 6;
    const numPipes = waveCount * cols.length * 2; 

    const pipeBodyGeo = new THREE.CylinderGeometry(pipeRadius, pipeRadius, 1, 32);
    pipeBodyGeo.translate(0, 0.5, 0); // Origin firmly situated at base
    const pipeCapGeo = new THREE.CylinderGeometry(pipeRadius + 0.15, pipeRadius + 0.15, 0.8, 32);

    const pipesMesh = new THREE.InstancedMesh(pipeBodyGeo, new THREE.MeshLambertMaterial({ color: 0x2ecc71 }), numPipes);
    const capsMesh = new THREE.InstancedMesh(pipeCapGeo, new THREE.MeshLambertMaterial({ color: 0x1e8449 }), numPipes);
    pipesMesh.castShadow = true; pipesMesh.receiveShadow = true;
    scene.add(pipesMesh); scene.add(capsMesh);

    const waves = [];
    for (let i = 0; i < waveCount; i++) {
        waves.push({ z: -30 - i * 18, gapCol: Math.floor(Math.random() * 3), gapY: 4.5 + Math.random() * 6, passed: false });
    }

    const dummy = new THREE.Object3D(), capDummy = new THREE.Object3D();

    function updatePipesMatrix() {
        let idx = 0;
        waves.forEach(w => {
            cols.forEach((cx, colIdx) => {
                if (colIdx === w.gapCol) {
                    // Gap Lane: Generate the Bottom Pipe + Top Pipe + Decorative Dark Caps
                    const bottomHeight = w.gapY - gapH / 2;
                    dummy.position.set(cx, 0, w.z); dummy.scale.set(1, bottomHeight, 1);
                    dummy.updateMatrix(); pipesMesh.setMatrixAt(idx, dummy.matrix);
                    capDummy.position.set(cx, bottomHeight - 0.4, w.z); capDummy.scale.set(1, 1, 1);
                    capDummy.updateMatrix(); capsMesh.setMatrixAt(idx, capDummy.matrix);
                    idx++;

                    const topHeight = roofY - (w.gapY + gapH / 2);
                    dummy.position.set(cx, w.gapY + gapH / 2, w.z); dummy.scale.set(1, topHeight, 1);
                    dummy.updateMatrix(); pipesMesh.setMatrixAt(idx, dummy.matrix);
                    capDummy.position.set(cx, w.gapY + gapH / 2 + 0.4, w.z); capDummy.scale.set(1, 1, 1);
                    capDummy.updateMatrix(); capsMesh.setMatrixAt(idx, capDummy.matrix);
                    idx++;
                } else {
                    // Solid Blocking Pillar (Recycles unneeded pipe/cap instances out of view)
                    dummy.position.set(cx, 0, w.z); dummy.scale.set(1, roofY, 1);
                    dummy.updateMatrix(); pipesMesh.setMatrixAt(idx, dummy.matrix);
                    capDummy.position.set(cx, -50, w.z); capDummy.scale.set(1, 0.1, 1); 
                    capDummy.updateMatrix(); capsMesh.setMatrixAt(idx, capDummy.matrix);
                    idx++;

                    dummy.position.set(cx, -50, w.z); dummy.scale.set(1, 0.1, 1); dummy.updateMatrix(); 
                    pipesMesh.setMatrixAt(idx, dummy.matrix); capsMesh.setMatrixAt(idx, capDummy.matrix); 
                    idx++;
                }
            });
        });
        pipesMesh.instanceMatrix.needsUpdate = true;
        capsMesh.instanceMatrix.needsUpdate = true;
    }

    // --- 6. CONTROLS (POINTER EVENTS API) ---
    const joyZone = document.getElementById('joystick-zone'), joyKnob = document.getElementById('joystick-knob');
    let pointerId = null;

    joyZone.addEventListener('pointerdown', e => {
        if (pointerId !== null) return;
        pointerId = e.pointerId; joyZone.setPointerCapture(pointerId);
        updateJoystick(e);
    });
    joyZone.addEventListener('pointermove', e => { if (pointerId === e.pointerId) updateJoystick(e); });
    
    const resetJoystick = (e) => {
        if (pointerId === e.pointerId) {
            pointerId = null; joyX = 0; joyKnob.style.transform = `translate(0px, 0px)`;
        }
    };
    joyZone.addEventListener('pointerup', resetJoystick);
    joyZone.addEventListener('pointercancel', resetJoystick);

    function updateJoystick(e) {
        const rect = joyZone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        let dx = e.clientX - centerX, dy = e.clientY - centerY;
        const maxRadius = rect.width / 2 - 30; 
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; }
        joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
        joyX = dx / maxRadius; // Sets bird's X-axis strafe velocity 
    }

    document.getElementById('jump-btn').addEventListener('pointerdown', e => {
        e.preventDefault(); // Halt delayed click processing
        if (gameState === 'PLAYING') birdVelocityY = jumpStrength;
    });

    document.getElementById('start-btn').addEventListener('pointerdown', e => {
        e.preventDefault();
        birdY = 7; birdX = 0; birdVelocityY = 0; score = 0;
        bird.rotation.set(0, 0, 0); 
        document.getElementById('hud').innerText = score;
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        
        waves.forEach((w, i) => {
            w.z = -30 - i * 18; w.gapCol = Math.floor(Math.random() * 3);
            w.gapY = 4.5 + Math.random() * 6; w.passed = false;
        });
        updatePipesMatrix(); gameState = 'PLAYING';
    });

    function gameOver() {
        gameState = 'GAMEOVER';
        document.getElementById('ui-layer').style.display = 'flex';
        document.getElementById('hud').style.display = 'none';
        document.getElementById('final-score').innerText = score;
        pointerId = null; joyX = 0; joyKnob.style.transform = `translate(0px, 0px)`;
        
        if (score > highScore) {
            highScore = score;
            try { localStorage.setItem('flappy3d_highscore', highScore); } catch (e) {}
            document.getElementById('high-score').innerText = highScore;
        }
    }

    // --- 7. RENDER LOOP & PHYSICS ENGINE ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(clock.getDelta(), 0.1);
        const time = clock.getElapsedTime();

        if (gameState === 'PLAYING') {
            // Core Game Mechanics
            birdVelocityY += gravity * delta;
            birdY += birdVelocityY * delta;
            birdX += joyX * 18 * delta;
            birdX = Math.max(-3.5, Math.min(3.5, birdX)); // Constrain player to columns mathematically

            if (birdY < birdRadius) { birdY = birdRadius; gameOver(); }
            if (birdY > roofY) { birdY = roofY; birdVelocityY = 0; }

            // Dynamic Bird Rotations & Flapping
            bird.position.set(birdX, birdY, 0);
            bird.rotation.z = -joyX * 0.4;
            bird.rotation.x = birdVelocityY * 0.04;
            const wingFlap = Math.sin(time * 20) * 0.6;
            wingL.rotation.y = -wingFlap; wingR.rotation.y = wingFlap;

            groundTex.offset.y += gameSpeed * 0.05 * delta;

            let hit = false;
            waves.forEach(w => {
                w.z += gameSpeed * delta;

                // Cylinder Math Collision Detection Strategy 
                if (w.z > -(pipeRadius + birdRadius) && w.z < (pipeRadius + birdRadius)) {
                    cols.forEach((cx, colIdx) => {
                        const isGap = (colIdx === w.gapCol);
                        const dx = birdX - cx, dz = 0 - w.z;
                        if (dx*dx + dz*dz < (birdRadius + pipeRadius)*(birdRadius + pipeRadius)) {
                            if (!isGap || birdY + birdRadius > w.gapY + gapH / 2 || birdY - birdRadius < w.gapY - gapH / 2) hit = true;
                        }
                    });
                }

                // Points Handling
                if (w.z > pipeRadius && !w.passed) {
                    w.passed = true; score++;
                    document.getElementById('hud').innerText = score;
                }

                // Endless Array Recycling
                if (w.z > 16) {
                    w.z -= waveCount * 18;
                    w.gapCol = Math.floor(Math.random() * 3);
                    w.gapY = 4.5 + Math.random() * 6; w.passed = false;
                }
            });
            
            if (hit) gameOver();
            updatePipesMatrix();

            // Active Smoothing Camera Tracking
            camera.position.x += (birdX * 0.3 - camera.position.x) * 5 * delta;
            camera.lookAt(birdX * 0.2, 5, -10);

        } else if (gameState === 'START') {
            // Initial Hovering 
            bird.position.set(0, 7 + Math.sin(time * 3) * 0.5, 0);
            bird.rotation.set(0, 0, 0);
            wingL.rotation.y = -Math.sin(time * 5) * 0.3; wingR.rotation.y = Math.sin(time * 5) * 0.3;
            groundTex.offset.y += gameSpeed * 0.05 * delta;
            
        } else if (gameState === 'GAMEOVER') {
            // Lethal Plunge
            birdVelocityY += gravity * delta;
            birdY += birdVelocityY * delta;
            if (birdY < birdRadius) { birdY = birdRadius; birdVelocityY = 0; }
            bird.position.set(birdX, birdY, 0);
            bird.rotation.x -= 5 * delta; 
            bird.rotation.y -= 3 * delta;
        }

        renderer.render(scene, camera);
    }

    // Auto-adjust layout on resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updatePipesMatrix();
    animate();
</script>
</body>
</html>
