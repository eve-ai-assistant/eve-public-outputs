<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>3D Flappy Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#87CEEB;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center}
.glass{background:rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.3);border-radius:16px;padding:10px 28px;color:#fff;font-family:system-ui,sans-serif;text-align:center;pointer-events:auto}
#score{font-size:52px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.25)}
#overPanel{display:none;margin-top:30vh;padding:24px 40px}
#overPanel h2{font-size:26px;margin-bottom:6px}
#overPanel p{font-size:15px;opacity:.85;line-height:1.6}
#startHint{margin-top:50vh;font-size:18px;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="ui">
  <div class="glass" style="margin-top:16px"><div id="score">0</div></div>
  <div class="glass" id="overPanel">
    <h2>Game Over</h2><p id="final"></p><p id="bestP"></p>
    <p style="margin-top:10px;opacity:.55;font-size:13px">Tap to restart</p>
  </div>
  <div class="glass" id="startHint">Tap to Flap!</div>
</div>
<script>
/* ── Config ── */
const GRAV = -20, FLAP_V = 8, SPEED = 5;
const GAP = 5.2, PIPE_SPACING = 3.0, Y_RANGE = 2.5;
const FLOOR_Y = -1;

/* ── State ── */
let birdY = 3, vel = 0, score = 0;
let best = +localStorage.getItem('fb3d') || 0;
let alive = true, started = false;
const pipes = [];

/* ── Renderer ── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ── Scene + Camera ── */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87CEEB, 25, 55);
const cam = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 80);
cam.position.set(6, 9, 18);
cam.lookAt(0, 2.5, 0);

/* ── Sky gradient background ── */
const bgC = document.createElement('canvas');
bgC.width = 2; bgC.height = 512;
const bgX = bgC.getContext('2d');
const grd = bgX.createLinearGradient(0, 0, 0, 512);
grd.addColorStop(0, '#4A8FD9');
grd.addColorStop(0.6, '#87CEEB');
grd.addColorStop(1, '#E0F0FA');
bgX.fillStyle = grd;
bgX.fillRect(0, 0, 2, 512);
scene.background = new THREE.CanvasTexture(bgC);

/* ── Lighting ── */
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(5, 15, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
Object.assign(sun.shadow.camera, {
  near: 1, far: 50, left: -15, right: 15, top: 20, bottom: -5
});
scene.add(sun);

/* ── Bird ── */
const bird = new THREE.Group();

// Body
const bBody = new THREE.Mesh(
  new THREE.SphereGeometry(0.45, 16, 12),
  new THREE.MeshStandardMaterial({ color: 0xFFD700 })
);
bBody.castShadow = true;
bird.add(bBody);

// Wings
const wMat = new THREE.MeshStandardMaterial({ color: 0xFF8C00, side: THREE.DoubleSide });
const wGeo = new THREE.PlaneGeometry(0.55, 0.25);
[[-0.35], [0.35]].forEach(function(z) {
  var w = new THREE.Mesh(wGeo, wMat);
  w.position.set(-0.1, 0.2, z[0]);
  bird.add(w);
});

// Eye
var eyeM = new THREE.Mesh(
  new THREE.SphereGeometry(0.09, 8, 6),
  new THREE.MeshStandardMaterial({ color: 0x111111 })
);
eyeM.position.set(0.32, 0.15, 0.18);
bird.add(eyeM);

// Beak
var beak = new THREE.Mesh(
  new THREE.ConeGeometry(0.11, 0.28, 8),
  new THREE.MeshStandardMaterial({ color: 0xFF5500 })
);
beak.rotation.z = -Math.PI / 2;
beak.position.set(0.52, 0.02, 0);
bird.add(beak);

scene.add(bird);

/* ── Ground + Grass ── */
var gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 30),
  new THREE.MeshStandardMaterial({ color: 0x8B7355 })
);
gnd.rotation.x = -Math.PI / 2;
gnd.position.y = FLOOR_Y;
gnd.receiveShadow = true;
scene.add(gnd);

var grassStrip = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 1.5),
  new THREE.MeshStandardMaterial({ color: 0x4CAF50 })
);
grassStrip.rotation.x = -Math.PI / 2;
grassStrip.position.set(0, FLOOR_Y + 0.01, 9);
scene.add(grassStrip);

/* ── Clouds ── */
var cMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
var clouds = [];
for (var i = 0; i < 6; i++) {
  var cg = new THREE.Group();
  for (var j = 0; j < 3; j++) {
    var r = Math.max(0.01, 0.7 + Math.random() * 1.2);
    var s = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), cMat);
    s.position.set(j * 1.4 - 1.4, Math.random() * 0.25, Math.random() * 0.4);
    cg.add(s);
  }
  cg.position.set(-10 + i * 9, 11 + Math.random() * 3, -5 - Math.random() * 8);
  scene.add(cg);
  clouds.push({ mesh: cg, speed: 0.15 + Math.random() * 0.2 });
}

/* ── Pipe materials (shared) ── */
var pMat = new THREE.MeshStandardMaterial({ color: 0x388E3C });
var capM = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });

/* ── Create a pipe pair at given x position ── */
function addPipe(x) {
  var gapY = 1.5 + (Math.random() - 0.5) * Y_RANGE * 2;
  var g = new THREE.Group();

  // Bottom pipe body
  var bH = Math.max(0.01, gapY - GAP / 2 - FLOOR_Y);
  var bm = new THREE.Mesh(new THREE.CylinderGeometry(1.15, 1.15, bH, 12), pMat);
  bm.position.y = FLOOR_Y + bH / 2;
  bm.castShadow = true; bm.receiveShadow = true;
  g.add(bm);

  // Bottom cap
  var bc = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 0.45, 12), capM);
  bc.position.y = gapY - GAP / 2 - 0.22;
  bc.castShadow = true;
  g.add(bc);

  // Top pipe body
  var tH = Math.max(0.01, 18 - (gapY + GAP / 2));
  var tm = new THREE.Mesh(new THREE.CylinderGeometry(1.15, 1.15, tH, 12), pMat);
  tm.position.y = gapY + GAP / 2 + tH / 2;
  tm.castShadow = true; tm.receiveShadow = true;
  g.add(tm);

  // Top cap
  var tc = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 0.45, 12), capM);
  tc.position.y = gapY + GAP / 2 + 0.22;
  tc.castShadow = true;
  g.add(tc);

  g.position.x = x;
  g.userData = { scored: false, gapY: gapY };
  scene.add(g);
  pipes.push(g);
}

/* ── Collision detection ── */
function checkHit() {
  var r = 0.38;
  if (birdY - r < FLOOR_Y || birdY + r > 11) return true;
  for (var i = 0; i < pipes.length; i++) {
    var px = pipes[i].position.x;
    if (Math.abs(px) < 1.15 + r) {
      var gy = pipes[i].userData.gapY;
      if (birdY - r < gy - GAP / 2 || birdY + r > gy + GAP / 2) return true;
    }
  }
  return false;
}

/* ── Game over ── */
function die() {
  alive = false;
  if (score > best) { best = score; localStorage.setItem('fb3d', best); }
  document.getElementById('final').textContent = 'Score: ' + score;
  document.getElementById('bestP').textContent = 'Best: ' + best;
  document.getElementById('overPanel').style.display = '';
}

/* ── Reset game ── */
function resetGame() {
  birdY = 3; vel = 0; score = 0;
  alive = true; started = false;
  for (var i = 0; i < pipes.length; i++) scene.remove(pipes[i]);
  pipes.length = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('overPanel').style.display = 'none';
  document.getElementById('startHint').style.display = '';
}

/* ── Flap action ── */
function flap() {
  if (!alive) { resetGame(); return; }
  if (!started) {
    started = true;
    document.getElementById('startHint').style.display = 'none';
    addPipe(10);
    addPipe(13);
  }
  vel = FLAP_V;
}

/* ── Input handling (Pointer Events for mobile compatibility) ── */
renderer.domElement.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  try { renderer.domElement.setPointerCapture(e.pointerId); } catch(err) {}
  flap();
});

/* ── Resize handler ── */
addEventListener('resize', function() {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ── Main game loop ── */
var prevTime = 0;

function update(t) {
  requestAnimationFrame(update);
  var dt = Math.min((t - prevTime) / 1000, 0.05);
  prevTime = t;

  if (started && alive) {
    // Physics
    vel += GRAV * dt;
    birdY += vel * dt;

    // Move pipes leftward
    for (var i = 0; i < pipes.length; i++) {
      pipes[i].position.x -= SPEED * dt;
    }

    // Score when pipe passes bird (x=0)
    for (var i = 0; i < pipes.length; i++) {
      if (!pipes[i].userData.scored && pipes[i].position.x < 0) {
        pipes[i].userData.scored = true;
        score++;
        document.getElementById('score').textContent = score;
      }
    }

    // Remove off-screen pipes
    while (pipes.length > 0 && pipes[0].position.x < -12) {
      scene.remove(pipes.shift());
    }

    // Spawn new pipe when needed
    if (pipes.length === 0) {
      addPipe(10);
    } else {
      var lastX = pipes[pipes.length - 1].position.x;
      if (lastX < 10) {
        addPipe(lastX + PIPE_SPACING);
      }
    }

    // Collision check
    if (checkHit()) die();
  }

  // Animate bird position and tilt
  bird.position.set(0, birdY, 0);
  bird.rotation.z = Math.min(Math.max(vel * 0.04, -0.7), 0.5);

  // Wing flap animation
  var wingA = started ? Math.sin(t / 80) * 0.4 : 0;
  if (bird.children[1]) bird.children[1].rotation.x = wingA;
  if (bird.children[2]) bird.children[2].rotation.x = -wingA;

  // Cloud drift
  for (var i = 0; i < clouds.length; i++) {
    clouds[i].mesh.position.x -= clouds[i].speed * dt;
    if (clouds[i].mesh.position.x < -20) {
      clouds[i].mesh.position.x = 25 + Math.random() * 10;
    }
  }

  renderer.render(scene, cam);
}

requestAnimationFrame(update);
</script>
</body>
</html>
